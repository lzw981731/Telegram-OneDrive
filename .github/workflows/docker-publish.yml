name: Publish Docker

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REPO: lzw981731/telegram-onedrive
  NAME: L-ING
  EMAIL: lzw981731@gmail.com
  # 这里引用你的 Token
  GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  # 自动获取 Release 版本号 (例如 v1.0.0)
  RELEASE_VERSION: ${{ github.event.release.name }}
  # 手动触发时叫 dev，发布时叫版本号
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && 'dev' || github.event.release.name }}

# 这里的权限给 write，配合后面的 Token 使用
permissions:
  contents: write

run-name: ${{ github.event_name == 'workflow_dispatch' && 'build dev' || github.event.release.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'lzw981731'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # 修正1：这里统一使用你的 MY_GITHUB_TOKEN，确保有权限回写代码
        token: ${{ env.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Update Version
      # 严谨判断：只有发布 Release 时才修改文件，手动运行不改
      if: github.event_name == 'release' && github.event.action == 'published'
      run: |
        PROJECT_NAME=$(grep '^name = ' Cargo.toml | awk -F'"' '{print $2}')
        sed -i "/^name = \"$PROJECT_NAME\"$/{N; s/version = \".*\"/version = \"$RELEASE_VERSION\"/}" Cargo.toml
        sed -i "/^name = \"$PROJECT_NAME\"$/{N; s/version = \".*\"/version = \"$RELEASE_VERSION\"/}" Cargo.lock

    - name: Commit and Push
      # 严谨判断：只有发布 Release 时才提交代码
      if: github.event_name == 'release' && github.event.action == 'published'
      run: |
        git config --global user.name $NAME
        git config --global user.email $EMAIL
        
        # 修正2：必须配置带 Token 的远程地址，否则会报 403 或 terminal prompts disabled
        git remote set-url origin https://x-access-token:${{ env.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        
        git add -A
        if git diff-index --quiet HEAD --; then
            echo "Bypass commit."
        else
            git commit -m "chore: update version to $RELEASE_VERSION"
            git tag -f $RELEASE_VERSION
            git push origin HEAD:master
            git push origin HEAD:master --tags -f
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image (Release)
      uses: docker/build-push-action@v5
      # 只有发布 Release 时运行，打上 v1.0.0 和 latest 标签
      if: github.event_name == 'release' && github.event.action == 'published'
      with:
        file: Dockerfile
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ env.REPO }}:${{ env.RELEASE_VERSION }},${{ env.REPO }}:latest

    - name: Build and push image (Manual/Dev)
      uses: docker/build-push-action@v5
      # 只有手动运行时运行，只打 latest 标签
      if: github.event_name == 'workflow_dispatch'
      with:
        file: Dockerfile
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ env.REPO }}:latest
    
    - name: Send Notification
      run: |
        curl -X POST -d "title=Github Actions Notification&body=$GITHUB_REPOSITORY@$TAG_NAME build completed." ${{ secrets.WEBHOOK_URL }}
