name: Publish Docker

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REPO: lzw981731/telegram-onedrive
  NAME: L-ING
  EMAIL: lzw981731@gmail.com
  # 这里恢复使用你指定的 MY_GITHUB_TOKEN
  GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  RELEASE_VERSION: ${{ github.event.release.name }}
  # 通知变量：手动触发显示 latest，发布显示版本号
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && 'latest' || github.event.release.name }}

permissions:
  contents: write

run-name: ${{ github.event_name == 'workflow_dispatch' && 'Manual Build (latest)' || github.event.release.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'lzw981731'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 恢复：使用你的 MY_GITHUB_TOKEN
          token: ${{ env.GITHUB_TOKEN }}
          fetch-depth: 0

      # 仅在发布 release 时修改版本号
      - name: Update Version
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
          PROJECT_NAME=$(grep '^name = ' Cargo.toml | awk -F'"' '{print $2}')
          sed -i "/^name = \"$PROJECT_NAME\"$/{N; s/version = \".*\"/version = \"$RELEASE_VERSION\"/}" Cargo.toml
          sed -i "/^name = \"$PROJECT_NAME\"$/{N; s/version = \".*\"/version = \"$RELEASE_VERSION\"/}" Cargo.lock

      # 仅在发布 release 时提交代码
      # 修复了这里：如果是手动运行，根本不会执行这一步，防止报错 129
      - name: Commit and Push
        if: github.event_name == 'release' && github.event.action == 'published'
        run: |
          # 双重保险：如果没有版本号，直接退出
          if [ -z "$RELEASE_VERSION" ]; then
            echo "No release version found. Skipping commit."
            exit 0
          fi

          git config --global user.name $NAME
          git config --global user.email $EMAIL
          
          # 关键：使用你的 MY_GITHUB_TOKEN 进行认证
          git remote set-url origin https://x-access-token:${{ env.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git add -A
          if git diff-index --quiet HEAD --; then
              echo "Bypass commit."
          else
              git commit -m "chore: update version to $RELEASE_VERSION"
              git tag -f $RELEASE_VERSION
              git push origin HEAD:master
              git push origin HEAD:master --tags -f
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 情况1：发布 Release -> 打版本号 + latest
      - name: Build and push image (Release)
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REPO }}:${{ env.RELEASE_VERSION }},${{ env.REPO }}:latest

      # 情况2：手动运行 -> 只打 latest
      - name: Build and push image (Manual)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REPO }}:latest
      
      # 通知
      - name: Send Notification
        run: |
          curl -X POST -d "title=Github Actions Notification&body=$GITHUB_REPOSITORY@$TAG_NAME build completed." ${{ secrets.WEBHOOK_URL }}
        continue-on-error: true
